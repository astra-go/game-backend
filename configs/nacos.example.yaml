# ============================================
# Nacos 连接配置示例
# ============================================
# 复制此文件为 nacos.yaml 并修改配置

# Nacos 服务器地址
server_addr: "localhost"

# 命名空间ID（默认为空，表示public）
namespace: ""

# 配置分组
group: "DEFAULT_GROUP"

# 配置的DataID
data_id: "astra-game.yaml"

# Nacos 认证信息（如果开启了认证）
username: "nacos"
password: "nacos"

# ============================================
# 使用说明
# ============================================
# 1. 复制此文件：
#    cp configs/nacos.example.yaml configs/nacos.yaml
#
# 2. 修改 configs/nacos.yaml 中的配置
#
# 3. 在代码中加载配置：
#    cfg, err := config.LoadConfig("configs/nacos.yaml")
#
# 4. 如果 Nacos 不可用，自动降级到本地配置：
#    configs/config.yaml
#
# ============================================
# Nacos 快速启动（Docker）
# ============================================
# docker run -d \
#   --name nacos-standalone \
#   -p 8848:8848 \
#   -p 9848:9848 \
#   -e MODE=standalone \
#   -e SPRING_DATASOURCE_PLATFORM=derby \
#   nacos/nacos-server:v2.2.3
#
# 访问控制台：http://localhost:8848/nacos
# 默认账号/密码：nacos/nacos
#
# ============================================
# 在 Nacos 中创建配置
# ============================================
# Data ID: astra-game.yaml
# Group: DEFAULT_GROUP
# 配置格式: YAML
# 配置内容: 参考 configs/config.yaml
